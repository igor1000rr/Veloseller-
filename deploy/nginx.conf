# Veloseller nginx config
# Перед выкладкой: sed -i "s|__DOMAIN__|your.domain|g" /etc/nginx/sites-available/veloseller

upstream veloseller_web {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream veloseller_worker {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Буферы под Next.js: длинные Vary + x-nextjs-* + Set-Cookie от Supabase
    # без этого получаем 502 "upstream sent too big header"
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    # Telegram webhook — выделённый endpoint на worker
    location /telegram/webhook {
        proxy_pass http://veloseller_worker;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5M;
    }

    # Всё остальное — Next.js
    location / {
        proxy_pass http://veloseller_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 50M;  # для CSV-upload
    }

    # Stripe webhook — raw body важен, никаких трансформаций
    location /api/stripe/webhook {
        proxy_pass http://veloseller_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
