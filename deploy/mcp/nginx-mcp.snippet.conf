# Вставить ВНУТРЬ существующего server-блока api.veloseller.ru (того, что
# слушает 443 — его создал certbot). Подставь два значения:
#   <СЕКРЕТ>      — длинная случайная строка (openssl rand -hex 16), часть URL
#   <SERVICE_JWT> — SERVICE_ROLE_KEY из /opt/supabase/docker/.env (eyJ...)
#
# Итоговый URL коннектора для claude.ai:
#   https://api.veloseller.ru/mcp-<СЕКРЕТ>/mcp
#
# nginx сам подставляет service-JWT, поэтому claude.ai шлёт запрос просто по
# секретному пути без своего токена. HenkDz видит валидный service_role —
# полный доступ ко всем инструментам.

location /mcp-<СЕКРЕТ>/ {
    proxy_pass http://127.0.0.1:3100/;
    proxy_http_version 1.1;
    proxy_set_header Authorization "Bearer <SERVICE_JWT>";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # MCP Streamable HTTP / SSE: не буферизировать, держать соединение
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
}
