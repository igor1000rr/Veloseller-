# Veloseller — балансировка кластера Next за nginx.
#
# Установка (один раз, на VPS под root):
#   cp /opt/veloseller/deploy/nginx-veloseller-upstream.conf /etc/nginx/conf.d/veloseller-upstream.conf
#   # в vhost veloseller.ru заменить строку:
#   #     proxy_pass http://127.0.0.1:3000;
#   #   на:
#   #     proxy_pass http://veloseller_web;
#   # и убедиться, что в том же location есть (для keepalive к апстриму):
#   #     proxy_http_version 1.1;
#   #     proxy_set_header Connection "";
#   nginx -t && systemctl reload nginx
#
# Порты ДОЛЖНЫ совпадать с WEB_PORTS в deploy/finalize.sh.
# least_conn — раздаёт запрос инстансу с наименьшим числом активных соединений
# (лучше round-robin для SSR с переменным временем ответа).
upstream veloseller_web {
    least_conn;
    server 127.0.0.1:3001 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:3002 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:3003 max_fails=2 fail_timeout=5s;
    keepalive 32;
}
