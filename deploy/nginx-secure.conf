# Veloseller — защищённый nginx-конфиг (HTTPS на veloseller.ru).
#  - HTTP redirect 80 → 443
#  - HTTPS с современным TLS
#  - Security headers (HSTS/CSP/etc)
#  - rate-limit обычных GET и POST /api/*
#  - блокируем scanner User-Agents + scanner пути
#  - правильные proxy-buffers для Next.js

limit_req_zone $binary_remote_addr zone=req_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=req_api:10m       rate=10r/s;
limit_req_zone $binary_remote_addr zone=req_login:10m     rate=3r/s;
limit_req_zone $binary_remote_addr zone=req_webhook:10m   rate=5r/s;

upstream veloseller_web    { least_conn; server 127.0.0.1:3001 max_fails=2 fail_timeout=5s; server 127.0.0.1:3002 max_fails=2 fail_timeout=5s; server 127.0.0.1:3003 max_fails=2 fail_timeout=5s; keepalive 64; }
upstream veloseller_worker { server 127.0.0.1:8001; keepalive 32; }

# Блокируем известные scanner User-Agents на уровне map
map $http_user_agent $is_scanner {
    default              0;
    "~*shodan"           1;
    "~*zgrab"            1;
    "~*masscan"          1;
    "~*nmap"             1;
    "~*zmeu"             1;
    "~*nikto"            1;
    "~*sqlmap"           1;
    "~*acunetix"         1;
    "~*nessus"           1;
    ""                   1;
}

# ============================================================================
# HTTP → HTTPS redirect
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name veloseller.ru www.veloseller.ru;

    # ACME challenge для certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# HTTPS — основной сервер
# ============================================================================
server {
    # Для старых nginx (<1.25) — http2 как параметр listen.
    # Для новых это тоже работает (deprecated warning, но не ошибка).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name veloseller.ru www.veloseller.ru;

    # SSL сертификаты (certbot сам положит сюда)
    ssl_certificate     /etc/letsencrypt/live/veloseller.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veloseller.ru/privkey.pem;

    # Современный TLS (Mozilla Intermediate profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Буферы под Next.js заголовки (иначе 502)
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    # Общие лимиты
    client_max_body_size  50M;
    client_body_timeout   30s;
    client_header_timeout 10s;
    keepalive_timeout     60s;
    send_timeout          30s;
    server_tokens         off;

    # Сканеры → 444 (close without response)
    if ($is_scanner) { return 444; }

    # Известные abuse-пути → 444 (одной строкой!)
    location ~* (?:wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|\.env|\.git|\.svn|boaform|/cgi-bin/|/setup\.cgi|/HNAP1|/manager/html|/phpmyadmin|/admin/login\.asp|/actuator/|/_ignition/) {
        return 444;
    }

    # Telegram webhook → worker (с rate-limit от flood-DDoS)
    location = /telegram/webhook {
        limit_req zone=req_webhook burst=10 nodelay;
        proxy_pass http://veloseller_worker;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5M;
    }

    # Robokassa Result/Success/Fail webhook'и — отдельный лимит
    location ~* ^/api/robokassa/(result|success|fail) {
        limit_req zone=req_webhook burst=10 nodelay;
        proxy_pass http://veloseller_web;
        proxy_set_header X-Middleware-Subrequest "";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /api/auth/* — жёсткий rate limit
    location ~* ^/api/(auth|login|register|forgot-password) {
        limit_req zone=req_login burst=5 nodelay;
        proxy_pass http://veloseller_web;
        proxy_set_header X-Middleware-Subrequest "";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальные /api/* — умеренный rate-limit
    location /api/ {
        limit_req zone=req_api burst=20 nodelay;
        proxy_pass http://veloseller_web;
        proxy_set_header X-Middleware-Subrequest "";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Всё остальное — Next.js
    location / {
        limit_req zone=req_general burst=40 nodelay;
        proxy_pass http://veloseller_web;
        proxy_set_header X-Middleware-Subrequest "";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
