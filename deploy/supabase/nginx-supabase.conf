# Supabase self-hosted за nginx: api.<домен> → Kong (127.0.0.1:8000).
# Положить в /etc/nginx/sites-available/, включить, затем certbot --nginx.
#
# Studio доступна по тому же домену (Kong отдаёт её под basic auth с
# DASHBOARD_USERNAME/DASHBOARD_PASSWORD из .env стека). Если Studio наружу
# не нужна вовсе — раскомментируй location-блокировку ниже.

server {
    listen 80;
    server_name api.veloseller.ru;  # или api.veloseller.com для .com-инстанса

    # большие выгрузки прайсов/отчётов
    client_max_body_size 60m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # realtime websocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # Закрыть Studio снаружи целиком (доступ только по SSH-туннелю):
    # location ~ ^/(project|api/platform) { return 403; }
}
