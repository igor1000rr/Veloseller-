# Supabase self-hosted за nginx: api.<домен> → Kong (127.0.0.1:8000).
# Положить в /etc/nginx/sites-available/, включить, затем certbot --nginx.
#
# Studio (web-консоль БД) закрыта снаружи по умолчанию — её видно только через
# SSH-туннель к 127.0.0.1:8000. Снаружи остаются доступны лишь data-API пути
# (/rest, /auth, /storage, /realtime). Если Studio наружу всё же нужна — закомmenть
# блокировку ниже (но тогда наружу торчит консоль БД за одним basic-auth Kong).
#
# ВАЖНО: зона лимита auth объявлена в http-контексте — положить рядом файл
# deploy/supabase/ratelimit-auth.conf в /etc/nginx/conf.d/ (там limit_req_zone).
#
# TLS ОБЯЗАТЕЛЕН ДО приёма трафика: этот блок слушает :80 для ACME-челленджа
# certbot; СРАЗУ после установки сертификата запустить `certbot --nginx` — он
# добавит 443-блок и редирект :80→:443. Не открывать api.<домен> наружу до TLS:
# /auth/v1/ проксирует логины (client-side прямо в GoTrue) — без HTTPS креды и
# JWT шли бы в плейнтексте. Security-заголовки ниже certbot копирует в 443-блок.

server {
    listen 80;
    server_name api.veloseller.ru;  # или api.veloseller.com для .com-инстанса

    # большие выгрузки прайсов/отчётов
    client_max_body_size 60m;

    # Security-заголовки (попадут в 443-блок после certbot --nginx). HSTS даёт
    # эффект по HTTPS; на голом :80 браузер его игнорирует — безвредно.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    server_tokens off;

    # Брутфорс/credential-stuffing на авторизацию (логин идёт client-side прямо в
    # GoTrue через этот прокси). Лимит щедрый (норм. логины/рефреши не задеть, в т.ч.
    # за NAT), но режет переборы. 429 на превышение. Доп. слой к лимитам GoTrue.
    location /auth/v1/ {
        limit_req zone=sb_auth burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # realtime websocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # Studio закрыта снаружи целиком (доступ только по SSH-туннелю).
    # data-API (/rest, /auth, /storage, /realtime) под / выше — не затрагивается.
    location ~ ^/(project|api/platform) { return 403; }
}
