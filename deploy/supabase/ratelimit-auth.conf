# limit_req зона для авторизации Supabase (GoTrue) — ДОЛЖНА быть в http-контексте.
# Положить в /etc/nginx/conf.d/ratelimit-auth.conf (рядом с proxy-buffers.conf).
# Используется в vhost api.veloseller.ru → location /auth/v1/.
#
# 60 запросов/мин на IP, всплеск 50 (nodelay). Щедро для легитимных логинов и
# refresh-token'ов (в т.ч. за общим NAT), но режет brute-force / credential-stuffing.
# Доп. слой к собственным лимитам GoTrue (defense-in-depth). Тюнить rate при нужде.
limit_req_zone $binary_remote_addr zone=sb_auth:10m rate=60r/m;
