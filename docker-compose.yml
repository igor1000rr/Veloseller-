# Локальная разработка worker. Web запускается через npm run dev:web отдельно.
# Supabase — внешний (self-hosted на api.veloseller.ru), локальный Postgres не нужен.
services:
  worker:
    build: ./apps/worker
    container_name: veloseller-worker
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DATABASE_URL: ${DATABASE_URL}
      WORKER_SECRET: ${WORKER_SECRET}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/gsa.json
    volumes:
      - ./apps/worker/secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
