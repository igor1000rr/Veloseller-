name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Новый push в main отменяет прошлый идущий CI — не тратим минуты на устаревшие коммиты
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: pytest + coverage
        env:
          SECRET_ENCRYPTION_KEY: "eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHg="
        run: |
          python -m pytest -q \
            --cov=app --cov-report=term-missing --cov-report=json:coverage.json
      - name: Coverage summary в GitHub Actions Summary
        if: always()
        run: |
          if [ -f coverage.json ]; then
            python -c "
          import json
          d = json.load(open('coverage.json'))
          pct = d['totals']['percent_covered']
          lines = d['totals']['num_statements']
          missed = d['totals']['missing_lines']
          print(f'## Worker coverage: **{pct:.1f}%**')
          print(f'- Всего строк: {lines}')
          print(f'- Не покрыто: {missed}')
          " >> $GITHUB_STEP_SUMMARY
          fi

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --legacy-peer-deps --no-audit --no-fund
      # TypeScript/ESLint пока НЕ блокируют деплой: есть бэклог ошибок, который
      # чистится постепенно. Здесь считаем число ошибок и пишем в Summary, чтобы
      # бэклог был виден и его можно было гнать вниз (ratchet).
      #
      # КАК СДЕЛАТЬ БЛОКИРУЮЩИМ (когда счётчик дойдёт до 0): убрать у шага
      # `continue-on-error: true`. ВНИМАНИЕ: deploy.yml гейтится на success CI
      # (workflow_run → conclusion == 'success'), поэтому блокирующий typecheck
      # при НЕнулевом бэклоге остановит ВСЕ деплои. Включать только при чистом tsc.
      - name: typecheck (tsc --noEmit)
        continue-on-error: true
        run: |
          npm run typecheck 2>&1 | tee /tmp/tsc.log || true
          ERRORS=$(grep -c "error TS" /tmp/tsc.log || true)
          echo "## TypeScript: ${ERRORS} ошибок (пока не блокирует)" >> "$GITHUB_STEP_SUMMARY"
          echo "TS errors: ${ERRORS}"
      - name: lint (next lint)
        continue-on-error: true
        run: |
          npm run lint 2>&1 | tee /tmp/lint.log || true
          ISSUES=$(grep -cE "Warning:|Error:" /tmp/lint.log || true)
          echo "## ESLint: ${ISSUES} замечаний (пока не блокирует)" >> "$GITHUB_STEP_SUMMARY"
          echo "ESLint issues: ${ISSUES}"
      - name: vitest + coverage
        run: npm run test:coverage
      - name: Coverage summary в GitHub Actions Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
          const d = require('./coverage/coverage-summary.json').total;
          const out = [
            '## Web coverage',
            '| Метрика | % | Покрыто/Всего |',
            '|---|---|---|',
            \`| Statements | \${d.statements.pct.toFixed(1)}% | \${d.statements.covered}/\${d.statements.total} |\`,
            \`| Branches | \${d.branches.pct.toFixed(1)}% | \${d.branches.covered}/\${d.branches.total} |\`,
            \`| Functions | \${d.functions.pct.toFixed(1)}% | \${d.functions.covered}/\${d.functions.total} |\`,
            \`| Lines | \${d.lines.pct.toFixed(1)}% | \${d.lines.covered}/\${d.lines.total} |\`,
          ].join('\n');
          require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, out + '\n');
          "
          fi
