name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  worker-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -m pytest -v
        env:
          SECRET_ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || 'eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4' }}
