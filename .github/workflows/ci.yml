name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Новый push в main отменяет прошлый идущий CI — не тратим минуты на устаревшие коммиты
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: pytest + coverage
        env:
          SECRET_ENCRYPTION_KEY: "eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHg="
        run: |
          python -m pytest -q \
            --cov=app --cov-report=term-missing --cov-report=json:coverage.json
      - name: Coverage summary в GitHub Actions Summary
        if: always()
        run: |
          if [ -f coverage.json ]; then
            python -c "
          import json
          d = json.load(open('coverage.json'))
          pct = d['totals']['percent_covered']
          lines = d['totals']['num_statements']
          missed = d['totals']['missing_lines']
          print(f'## Worker coverage: **{pct:.1f}%**')
          print(f'- Всего строк: {lines}')
          print(f'- Не покрыто: {missed}')
          " >> $GITHUB_STEP_SUMMARY
          fi

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --legacy-peer-deps --no-audit --no-fund
      # TypeScript/ESLint теперь БЛОКИРУЮТ CI (ratchet завершён). Шаги по-прежнему
      # пишут число ошибок в Summary, но падают (exit $STATUS), если ошибки есть.
      # ВНИМАНИЕ: deploy.yml гейтится на success CI — если в коде остались TS/lint
      # ошибки, этот PR покраснеет (и мержить его не надо, пока не вычистите).
      - name: typecheck (tsc --noEmit)
        run: |
          set +e
          npm run typecheck 2>&1 | tee /tmp/tsc.log
          STATUS=${PIPESTATUS[0]}
          set -e
          ERRORS=$(grep -c "error TS" /tmp/tsc.log || true)
          echo "## TypeScript: ${ERRORS} ошибок" >> "$GITHUB_STEP_SUMMARY"
          exit $STATUS
      - name: lint (next lint)
        run: |
          set +e
          npm run lint 2>&1 | tee /tmp/lint.log
          STATUS=${PIPESTATUS[0]}
          set -e
          ISSUES=$(grep -cE "Warning:|Error:" /tmp/lint.log || true)
          echo "## ESLint: ${ISSUES} замечаний" >> "$GITHUB_STEP_SUMMARY"
          exit $STATUS
      # next build — ловим сломанную прод-сборку В CI, а не на живом сервере во
      # время деплоя (отката нет, см. deploy.yml). Сборка не требует рантайм-env.
      - name: build (next build)
        run: npm run build
      - name: vitest + coverage
        run: npm run test:coverage
      - name: Coverage summary в GitHub Actions Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
          const d = require('./coverage/coverage-summary.json').total;
          const out = [
            '## Web coverage',
            '| Метрика | % | Покрыто/Всего |',
            '|---|---|---|',
            \`| Statements | \${d.statements.pct.toFixed(1)}% | \${d.statements.covered}/\${d.statements.total} |\`,
            \`| Branches | \${d.branches.pct.toFixed(1)}% | \${d.branches.covered}/\${d.branches.total} |\`,
            \`| Functions | \${d.functions.pct.toFixed(1)}% | \${d.functions.covered}/\${d.functions.total} |\`,
            \`| Lines | \${d.lines.pct.toFixed(1)}% | \${d.lines.covered}/\${d.lines.total} |\`,
          ].join('\n');
          require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, out + '\n');
          "
          fi
