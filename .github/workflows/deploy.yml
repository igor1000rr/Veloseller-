name: Deploy

on:
  # Деплой запускается ТОЛЬКО после успешного CI
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Новый деплой отменяет прошлый идущий — не нужно катить устаревший коммит
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    # Деплоим ТОЛЬКО зелёный CI И ТОЛЬКО по ветке main. Без явной проверки
    # head_branch зелёный CI чужой ветки (workflow_run срабатывает на любой) мог
    # бы инициировать прод-деплой текущего main.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Настройка SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Деплой через SSH (используем finalize.sh)
        env:
          # Значения — через env + позиционный аргумент, БЕЗ интерполяции ${{ }}
          # внутри shell-скрипта (классический script-injection анти-паттерн:
          # Actions подставляет ${{ }} как текст до того, как shell их экранирует).
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' -- "$HEAD_SHA" << 'EOF'
            set -euo pipefail
            HEAD_SHA="$1"
            cd /opt/veloseller

            echo "→ запоминаем текущий SHA для возможного отката (см. шаг rollback)"
            git rev-parse HEAD > /tmp/veloseller_prev_sha || true

            echo "→ checkout проверенного CI-коммита (а не текущего origin/main)"
            git fetch origin main
            # Пиним деплой на ИМЕННО тот SHA, что прошёл CI: иначе второй push,
            # прилетевший пока деплой в очереди, выкатил бы непроверенный коммит.
            git reset --hard "$HEAD_SHA"

            echo "→ chmod +x для всех скриптов деплоя"
            chmod +x /opt/veloseller/deploy/*.sh || true

            echo "→ запуск finalize.sh (npm install + pip + build + restart)"
            sudo bash /opt/veloseller/deploy/finalize.sh

            echo "✅ deploy OK ($(git rev-parse --short HEAD))"
          EOF

      - name: Smoke tests — честный healthcheck (DB + worker + env)
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' << 'EOF'
            set -euo pipefail

            # /api/health проверяет Supabase + worker + env vars. Возвращает:
            #   200 — всё живо
            #   503 — что-то degraded (ДБ down, worker не отвечает, env отсутствуют)
            # Ретраи — даём Next.js прогреться после рестарта.
            for i in 1 2 3 4 5; do
              resp=$(curl -s -w "\n%{http_code}" --max-time 10 http://127.0.0.1:3001/api/health || true)
              code=$(echo "$resp" | tail -n1)
              body=$(echo "$resp" | sed '$d')
              if [ "$code" = "200" ]; then
                echo "✅ /api/health → 200 (попытка $i)"
                echo "$body" | head -c 500
                echo
                break
              fi
              if [ $i -eq 5 ]; then
                echo "❌ /api/health → $code (ожидали 200)"
                echo "$body" | head -c 500
                echo
                echo "→ подсказка: journalctl -u veloseller-web -u veloseller-worker --since '2 min ago'"
                exit 1
              fi
              echo "… /api/health → $code, retry $i/5"
              sleep 5
            done

            # Дополнительно пингуем worker напрямую — если web под ним виртуалом работает и ответил 200,
            # а worker upstream не отвечает — /api/health вернёт 503, поэтому вторая проверка для ясности логов.
            if curl -fsS http://127.0.0.1:8001/health -o /dev/null --max-time 5; then
              echo "✅ worker /health отвечает напрямую"
            else
              echo "⚠️  worker /health не ответил напрямую (но /api/health вернул 200 — возможно race или проблема с портом)"
            fi
          EOF

      - name: Smoke tests — external (HTTPS + open redirect)
        run: |
          # External smoke: HTTPS домен + базовые security проверки.
          # Telegram webhook check убран (см. issue #1) — Барн блокирует api.telegram.org из РФ.
          set -euo pipefail
          FQDN="veloseller.ru"

          echo "→ 1) HTTPS корень должен отвечать 200/3xx"
          code=$(curl -sw "%{http_code}" -o /dev/null --max-time 10 "https://$FQDN/")
          if [[ "$code" =~ ^(200|301|302|307|308)$ ]]; then
            echo "  ✅ https://$FQDN/ → $code"
          else
            echo "  ❌ https://$FQDN/ → $code (ожидали 200/3xx)"
            exit 1
          fi

          echo "→ 2) /api/health извне должен вернуть 200"
          code=$(curl -sw "%{http_code}" -o /dev/null --max-time 10 "https://$FQDN/api/health")
          if [ "$code" = "200" ]; then
            echo "  ✅ https://$FQDN/api/health → 200"
          else
            echo "  ❌ https://$FQDN/api/health → $code"
            exit 1
          fi

          echo "→ 3) Open redirect защита: /auth/callback?next=https://evil.com не ведёт на evil.com"
          # FIXED (issue #2): редирект строится от NEXT_PUBLIC_SITE_URL, поэтому
          # Location указывает на публичный домен (не localhost). Падаем на любом
          # внешнем домене в Location.
          location=$(curl -s -o /dev/null -w "%{redirect_url}" --max-time 10 \
            "https://$FQDN/auth/callback?next=https%3A%2F%2Fevil.com")
          if echo "$location" | grep -qi "evil.com"; then
            echo "  ❌ Open redirect ПОЛОМАН: Location=$location"
            exit 1
          fi
          echo "  ✅ Location=$location (не evil.com)"

          echo "✅ Все external smoke tests прошли"

      - name: Откат при провале деплоя или smoke
        if: failure()
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          # Деплой не атомарен (in-place rebuild + restart живого кластера). Если
          # деплой ИЛИ smoke упали — откатываемся на предыдущий SHA и пересобираем,
          # чтобы прод не остался на сломанной сборке (раньше отката не было —
          # «❌ exit 1» оставлял прод лежать до ручного вмешательства).
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' << 'EOF'
            set -uo pipefail
            cd /opt/veloseller
            if [ ! -f /tmp/veloseller_prev_sha ]; then
              echo "нет сохранённого prev SHA (упали до reset) — откат пропущен"
              exit 0
            fi
            PREV=$(cat /tmp/veloseller_prev_sha)
            CUR=$(git rev-parse HEAD)
            if [ "$PREV" = "$CUR" ]; then
              echo "уже на prev ($PREV) — откат не нужен"
              exit 0
            fi
            echo "↩ откат $CUR → $PREV"
            git reset --hard "$PREV"
            sudo bash /opt/veloseller/deploy/finalize.sh
            echo "✅ откат выполнен ($(git rev-parse --short HEAD))"
          EOF

  # Богатый E2E-смоук против прода ПОСЛЕ деплоя (на Actions-раннере, не на VPS):
  # раздельный CSP (nonce на app / мягкий на статике), security-заголовки,
  # auth-гейты 401, уникальность nonce. Ловит регрессии того, что настроено в
  # middleware/nginx/next.config. Падение job'а = регрессия (deploy уже прошёл).
  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --legacy-peer-deps
      - name: E2E smoke против прода
        env:
          E2E_BASE_URL: https://veloseller.ru
        run: npm run test:e2e -w @veloseller/web
