name: Deploy

on:
  # Деплой запускается ТОЛЬКО после успешного CI
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Новый деплой отменяет прошлый идущий — не нужно катить устаревший коммит
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Настройка SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Деплой через SSH (используем finalize.sh)
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'bash -s' << 'EOF'
            set -euo pipefail
            cd /opt/veloseller

            echo "→ git pull"
            git fetch origin main
            git reset --hard origin/main

            echo "→ запуск finalize.sh (npm install в корне workspaces + pip + build + restart)"
            sudo /opt/veloseller/deploy/finalize.sh

            echo "✅ deploy OK ($(git rev-parse --short HEAD))"
          EOF
