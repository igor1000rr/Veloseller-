name: Deploy EU

# EU (.com, Contabo) деплоится ТОЛЬКО после успешного деплоя .ru
# (workflow "Deploy") — .ru играет роль канарейки.
# Включается переменной репозитория DEPLOY_EU_ENABLED=true после настройки
# EU-доступа. Host/user — из vars (DEPLOY_HOST_EU/DEPLOY_USER_EU), ключ — из secrets
# (DEPLOY_SSH_KEY_EU). До включения флага воркфлоу спит.
on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-eu
  cancel-in-progress: true

jobs:
  deploy-eu:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_EU_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Настройка SSH (EU)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_EU }}" > ~/.ssh/deploy_key_eu
          chmod 600 ~/.ssh/deploy_key_eu
          ssh-keyscan -H ${{ vars.DEPLOY_HOST_EU }} >> ~/.ssh/known_hosts

      - name: Деплой EU через SSH (finalize.sh)
        run: |
          ssh -i ~/.ssh/deploy_key_eu ${{ vars.DEPLOY_USER_EU }}@${{ vars.DEPLOY_HOST_EU }} 'bash -s' << 'EOF'
            set -euo pipefail
            cd /opt/veloseller
            echo "→ git pull (EU)"
            git fetch origin main
            git reset --hard origin/main
            chmod +x /opt/veloseller/deploy/*.sh || true
            echo "→ finalize.sh (EU)"
            sudo bash /opt/veloseller/deploy/finalize.sh
            echo "✅ EU deploy OK ($(git rev-parse --short HEAD))"
          EOF

      - name: Smoke EU — internal /api/health
        run: |
          ssh -i ~/.ssh/deploy_key_eu ${{ vars.DEPLOY_USER_EU }}@${{ vars.DEPLOY_HOST_EU }} 'bash -s' << 'EOF'
            set -euo pipefail
            for i in 1 2 3 4 5; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:3000/api/health || true)
              if [ "$code" = "200" ]; then echo "✅ EU /api/health → 200 (try $i)"; break; fi
              if [ "$i" -eq 5 ]; then echo "❌ EU /api/health → $code"; exit 1; fi
              echo "… EU /api/health → $code, retry $i/5"; sleep 5
            done
          EOF

      - name: Smoke EU — external HTTPS (veloseller.com)
        run: |
          set -euo pipefail
          FQDN="veloseller.com"
          code=$(curl -sw "%{http_code}" -o /dev/null --max-time 10 "https://$FQDN/")
          if [[ "$code" =~ ^(200|301|302|307|308)$ ]]; then echo "  ✅ https://$FQDN/ → $code"; else echo "  ❌ https://$FQDN/ → $code"; exit 1; fi
          code=$(curl -sw "%{http_code}" -o /dev/null --max-time 10 "https://$FQDN/api/health")
          if [ "$code" = "200" ]; then echo "  ✅ https://$FQDN/api/health → 200"; else echo "  ❌ https://$FQDN/api/health → $code"; exit 1; fi
          echo "✅ EU external smoke прошли"
